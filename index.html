<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Controle</title>
</head>
<body>
    <div class="container">
        <button class="btn-iniciar" onclick="controlarRobo('iniciar')">Iniciar</button>
        <button class="btn-encerrar" onclick="controlarRobo('encerrar')">Encerrar</button>
    </div>

    <script>
        // Se você usar o servidor Microdot no robô, use o IP dele.
        // Se usar o servidor Node no seu PC, use 'http://localhost:3000'
        const URL_SERVIDOR = "http://localhost:3000";

        function controlarRobo(comando) {
            console.log("Enviando comando:", comando);
            
            fetch(`${URL_SERVIDOR}/${comando}`)
                .then(response => {
                    if (response.ok) {
                        console.log("Sucesso!");
                    }
                })
                .catch(error => {
                    console.error("Erro na conexão:", error);
                    alert("Não foi possível conectar ao robô.");
                });
        }
    </script>
</body>
</html>
